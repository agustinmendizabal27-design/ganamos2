<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0005; }

  .landing {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .bg-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 260px;
    background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.85) 40%, rgba(0,0,0,0.4) 75%, transparent 100%);
  }

  .wa-section {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 12px 16px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* LOGO TEXTO */
  .logo-texto {
    text-align: center;
    line-height: 1;
  }
  .logo-titulo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    background: linear-gradient(180deg, #FFE566 0%, #FFD700 40%, #CC8800 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,200,0,0.5));
  }
  .logo-estrella {
    font-size: 28px;
    display: block;
    margin-top: -4px;
  }

  /* BOTÓN WA */
  .wa-btn {
    width: 100%;
    padding: 18px 20px;
    border-radius: 16px;
    border: 3px solid #00FF66;
    background: linear-gradient(135deg, #1DB954, #25D366, #128C7E);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    box-shadow:
      0 0 40px rgba(37,211,102,0.7),
      0 0 80px rgba(37,211,102,0.3),
      0 4px 20px rgba(0,0,0,0.6);
    animation: waPulse 2s ease-in-out infinite;
    transition: transform 0.15s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }
  .wa-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: waShimmer 2s ease-in-out infinite;
  }
  @keyframes waShimmer {
    0% { left: -100%; }
    50%,100% { left: 100%; }
  }
  .wa-btn:active { transform: scale(0.97); }

  @keyframes waPulse {
    0%,100% {
      box-shadow: 0 0 40px rgba(37,211,102,0.7), 0 0 80px rgba(37,211,102,0.3), 0 4px 20px rgba(0,0,0,0.6);
    }
    50% {
      box-shadow: 0 0 60px rgba(37,211,102,1), 0 0 100px rgba(37,211,102,0.5), 0 0 0 8px rgba(37,211,102,0.2);
    }
  }

  .wa-btn-top {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .wa-btn-top svg { width: 32px; height: 32px; fill: #fff; flex-shrink: 0; }

  .wa-btn-sub {
    color: rgba(255,255,255,0.92);
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
</style>

<body>

<div class="landing">
  <img class="bg-img" src="bg.jpg" alt="Red Estrella" />
  <div class="bg-overlay"></div>

  <div class="wa-section">

    <!-- LOGO -->
    <div class="logo-texto">
      <span class="logo-estrella">⭐</span>
      <div class="logo-titulo">RED ESTRELLA</div>
    </div>

    <!-- BOTÓN WA -->
    <button class="wa-btn" onclick="abrirWA()">
      <div class="wa-btn-top">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        HABLAR POR WHATSAPP
      </div>
      <div class="wa-btn-sub">Tocá acá y empezá ahora</div>
    </button>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAw6aV8a0aJyrOA_5miXajbojv1JKEJ4jg",
    authDomain: "ganamosnet-12cca.firebaseapp.com",
    projectId: "ganamosnet-12cca",
    storageBucket: "ganamosnet-12cca.firebasestorage.app",
    messagingSenderId: "337775620471",
    appId: "1:337775620491:web:8978522a1ace8e2e8c7f8e"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);
  const waMensaje = encodeURIComponent("¡Hola! Quiero mi usuario en Red Estrella 🎰");
  let waNumeros = [];
  let waIndex = parseInt(localStorage.getItem('gn_wa_idx2') || '0');
  let firebaseReady = false;

  onSnapshot(doc(db, 'config', 'whatsapp'), (snap) => {
    if (snap.exists()) {
      waNumeros = snap.data().numeros || [];
      firebaseReady = true;
    }
  });

  window._waMensaje2 = waMensaje;
  window._getWaNumeros2 = () => waNumeros;
  window._getWaIndex2 = () => waIndex;
  window._setWaIndex2 = (v) => { waIndex = v; };
  window._isFirebaseReady2 = () => firebaseReady;
</script>

<script>
  window.abrirWA = function() {
    if (!window._isFirebaseReady2 || !window._isFirebaseReady2()) {
      let intentos = 0;
      const esperar = setInterval(() => {
        intentos++;
        if (window._isFirebaseReady2 && window._isFirebaseReady2()) {
          clearInterval(esperar);
          window.abrirWA();
        } else if (intentos > 15) {
          clearInterval(esperar);
          alert("No hay líneas disponibles. Intentá en unos minutos.");
        }
      }, 200);
      return;
    }

    const waNumeros = window._getWaNumeros2 ? window._getWaNumeros2() : [];
    let waIndex = window._getWaIndex2 ? window._getWaIndex2() : 0;
    const waMensaje = window._waMensaje2 || encodeURIComponent("¡Hola! Quiero mi usuario en Red Estrella 🎰");
    const activos = waNumeros.filter(n => n.estado === 'activo');
    if (!activos.length) { alert("No hay líneas disponibles. Intentá en unos minutos."); return; }
    const entry = activos[waIndex % activos.length];
    if (typeof fbq !== 'undefined') fbq('track', 'Lead');
    window.open("https://wa.me/" + entry.numero + "?text=" + waMensaje, '_blank');
    waIndex++;
    if (window._setWaIndex2) window._setWaIndex2(waIndex);
    localStorage.setItem('gn_wa_idx2', waIndex);
    const t = Date.now();
    const check = setInterval(() => {
      if (document.visibilityState === 'visible' && Date.now() - t > 1500 && Date.now() - t < 5000) {
        clearInterval(check);
        waIndex++;
        if (window._setWaIndex2) window._setWaIndex2(waIndex);
        localStorage.setItem('gn_wa_idx2', waIndex);
        window.abrirWA();
      }
      if (Date.now() - t > 6000) clearInterval(check);
    }, 500);
  };
</script>
</body>
